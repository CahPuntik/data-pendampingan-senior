<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:,">
    <title>Data Pendampingan Senior</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #2e687bff, #00384d, #002b3d);
            color: #fff;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        .background-image {
            position: fixed;
            left: 0;
            bottom: 0;
            width: 250px;
            height: 250px;
            opacity: 0.45;
            pointer-events: none;
            background-image: url('icons/efek2.png'); /* Ganti dengan path gambar jika ada */
            background-position: left bottom;
            background-repeat: no-repeat;
            background-size: contain;
            z-index: 0;
        }

        .container {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .title {
            font-size: 24px;
            font-weight: bold;
            text-align: left;
            margin-bottom: 20px;
            color: #ffffff;
        }

        .card {
            background-color: transparent;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            color: #333;
        }

        #searchForm {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        input, select, button {
            padding: 10px;
            margin: 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            flex: 1;
            min-width: 120px;
        }

        button {
            background-color: #3A95C9;
            color: white;
            cursor: pointer;
            font-weight: 600;
            flex: none;
        }

        button {
            background-color: #3A95C9;
            color: white;
            cursor: pointer;
            font-weight: 600;
        }

        button:hover {
            background-color: #2e687b;
        }

        .result h2 {
            color: #fff;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }

        th {
            background-color: #3A95C9;
            color: white;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #3A95C9;
            font-weight: bold;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3A95C9;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
            .container {
                padding: 8px;
            }

            .title {
                font-size: 20px;
            }

            .card {
                padding: 15px;
            }

            .background-image {
                width: 150px;
                height: 150px;
                opacity: 0.25;
            }

            #searchForm {
                flex-direction: column;
                align-items: stretch;
            }

            input, select, button {
                min-width: auto;
            }

            .table-view {
                display: none;
            }

            .card-view {
                display: block;
            }

            .result-card {
                background-color: #fff;
                border-radius: 8px;
                padding: 15px;
                margin-bottom: 10px;
                box-shadow: 0 2px 5px rgba(0,0,0,0.1);
                color: #333;
            }

            .result-card-item {
                margin-bottom: 8px;
                font-size: 14px;
            }

            .result-card-item strong {
                color: #3A95C9;
            }
        }

        @media (min-width: 769px) {
            .card-view {
                display: none;
            }

            .table-view {
                display: block;
            }
        }
    </style>
</head>
<body>
    <div class="background-image" aria-hidden="true"></div>

    <div class="container">
        <h1 class="title">Data Pendampingan Senior</h1>
        <div class="card">
            <form id="searchForm">
                <input type="text" id="nrp" name="nrp" placeholder="Masukkan NRP" required>
                <select id="bulan" name="bulan" required>
                    <option value="">Bulan</option>
                    <option value="Januari">Januari</option>
                    <option value="Februari">Februari</option>
                    <option value="Maret">Maret</option>
                    <option value="April">April</option>
                    <option value="Mei">Mei</option>
                    <option value="Juni">Juni</option>
                    <option value="Juli">Juli</option>
                    <option value="Agustus">Agustus</option>
                    <option value="September">September</option>
                    <option value="Oktober">Oktober</option>
                    <option value="November">November</option>
                    <option value="Desember">Desember</option>
                </select>
                <input type="number" id="tahun" name="tahun" min="2000" max="2100" placeholder="Masukkan Tahun">
                <button type="submit">Cari</button>
            </form>
        </div>
        <div id="result" class="result card">
            <div id="loading" class="loading" style="display: none;">
                <div class="spinner"></div>
                Mencari data...
            </div>
            <!-- Hasil akan muncul di sini -->
        </div>
    </div>

    <script>
        const apiUrl = 'https://script.google.com/macros/s/AKfycbzP4F2bjyO295Xekw7SttE9mrDGvQ1tnhJWKgdayP3sE0_kdVfjX1v4tVHhXGEWoLyEuA/exec';

        function formatDate(dateString) {
            if (!dateString) return '';
            try {
                const date = new Date(dateString);
                if (isNaN(date.getTime())) return dateString; // Jika tidak valid, kembalikan asli
                
                const day = String(date.getDate()).padStart(2, '0');
                const monthNames = [
                    'Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni',
                    'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'
                ];
                const month = monthNames[date.getMonth()];
                const year = date.getFullYear();
                
                return `${day} ${month} ${year}`;
            } catch (e) {
                return dateString;
            }
        }

        function jsonpCallback(data) {
            console.log('Callback called with:', data);
            // Re-enable button
            const button = document.querySelector('button[type="submit"]');
            button.disabled = false;
            button.textContent = 'Cari';
            displayResults(data);
        }

        document.getElementById('searchForm').addEventListener('submit', function(e){
            e.preventDefault();

            const nrp = document.getElementById('nrp').value.trim();
            const bulan = document.getElementById('bulan').value;
            const tahun = document.getElementById('tahun').value;

            console.log('Submitting:', {nrp, bulan, tahun});

            // Disable button and show loading
            const button = document.querySelector('button[type="submit"]');
            button.disabled = true;
            button.textContent = 'Mencari...';

            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<div class="loading"><div class="spinner"></div>Mencari data...</div>';

            // Buat script tag untuk JSONP
            const script = document.createElement('script');
            script.src = `${apiUrl}?nrp=${encodeURIComponent(nrp)}&bulan=${encodeURIComponent(bulan)}&tahun=${encodeURIComponent(tahun)}&callback=jsonpCallback`;
            console.log('Script src:', script.src);
            document.head.appendChild(script);

            // Handle success
            script.onload = function() {
                console.log('Script loaded successfully');
                document.head.removeChild(script);
                // Re-enable button
                button.disabled = false;
                button.textContent = 'Cari';
            };

            // Handle error
            script.onerror = function() {
                console.error('Error loading script');
                resultDiv.innerHTML = '<p>Error loading data. Check console for details.</p>';
                document.head.removeChild(script);
                // Re-enable button
                button.disabled = false;
                button.textContent = 'Cari';
            };
        });

        function displayResults(data){
            const resultDiv = document.getElementById('result');

            // Handle error response
            if (data && data.error) {
                resultDiv.innerHTML = `<p>Error: ${data.message}</p>`;
                return;
            }

            if(!data || data.length === 0){
                resultDiv.innerHTML = "<p>Tidak ada data ditemukan</p>";
                return;
            }

            const hitCount = Array.isArray(data) ? data.length : 0;
            const titleText = `Hasil Pencarian (${hitCount} Data)`;

            // Table view
            let tableHtml = `<h2>${titleText}</h2>`;
            tableHtml += "<table>";
            tableHtml += "<thead><tr>";
            tableHtml += "<th>Nama</th>";
            tableHtml += "<th>NRP</th>";
            tableHtml += "<th>CN Unit</th>";
            tableHtml += "<th>Nama Instruktur</th>";
            tableHtml += "<th>Tanggal</th>";
            tableHtml += "<th>Lokasi</th>";
            tableHtml += "<th>Shift</th>";
            tableHtml += "<th>Keterangan</th>";
            tableHtml += "</tr></thead><tbody>";

            // Card view
            let cardHtml = `<h2>${titleText}</h2>`;

            data.forEach(row=>{
                // Format tanggal
                row["Tanggal"] = formatDate(row["Tanggal"]);

                // Table row
                tableHtml += "<tr>";
                tableHtml += `<td>${row["Nama"] || ""}</td>`;
                tableHtml += `<td>${row["NRP"] || ""}</td>`;
                tableHtml += `<td>${row["CN Unit"] || ""}</td>`;
                tableHtml += `<td>${row["Nama Instruktur"] || ""}</td>`;
                tableHtml += `<td>${row["Tanggal"] || ""}</td>`;
                tableHtml += `<td>${row["Lokasi"] || ""}</td>`;
                tableHtml += `<td>${row["Shift"] || ""}</td>`;
                tableHtml += `<td>${row["Keterangan"] || ""}</td>`;
                tableHtml += "</tr>";

                // Card
                cardHtml += '<div class="result-card">';
                cardHtml += `<div class="result-card-item"><strong>Nama:</strong> ${row["Nama"] || ""}</div>`;
                cardHtml += `<div class="result-card-item"><strong>NRP:</strong> ${row["NRP"] || ""}</div>`;
                cardHtml += `<div class="result-card-item"><strong>CN Unit:</strong> ${row["CN Unit"] || ""}</div>`;
                cardHtml += `<div class="result-card-item"><strong>Nama Instruktur:</strong> ${row["Nama Instruktur"] || ""}</div>`;
                cardHtml += `<div class="result-card-item"><strong>Tanggal:</strong> ${row["Tanggal"] || ""}</div>`;
                cardHtml += `<div class="result-card-item"><strong>Lokasi:</strong> ${row["Lokasi"] || ""}</div>`;
                cardHtml += `<div class="result-card-item"><strong>Shift:</strong> ${row["Shift"] || ""}</div>`;
                cardHtml += `<div class="result-card-item"><strong>Keterangan:</strong> ${row["Keterangan"] || ""}</div>`;
                cardHtml += '</div>';
            });

            tableHtml += "</tbody></table>";

            resultDiv.innerHTML = `<div class="table-view">${tableHtml}</div><div class="card-view">${cardHtml}</div>`;
        }
    </script>
</body>
</html>
